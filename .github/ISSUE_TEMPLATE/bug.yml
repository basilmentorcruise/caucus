name: Bug
description: Something isn't working as intended.
title: "bug: <short summary>"
labels: ["type:bug", "needs-triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and the impact.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [infra, backbone, schema, mcp, hook, identity, demo]
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Versions, OS, how you're running Caucus.
